apiVersion: v1
kind: ConfigMap
metadata:
  name: media-service-config
  labels:
    app: vault
    service: media-service
data:
  PORT: "3004"
  NODE_ENV: "production"
  MOCK_SERVICES: "false"
  LOG_LEVEL: "info"
  MAX_FILE_SIZE_MB: "50"
  R2_ACCOUNT_ID: "CHANGE_ME"
  R2_BUCKET: "vault-assets-prod"
  R2_PUBLIC_URL: "https://assets.vault.ae"
