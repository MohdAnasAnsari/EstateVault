apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-service-config
  labels:
    app: vault
    service: analytics-service
data:
  PORT: "3008"
  NODE_ENV: "production"
  MOCK_SERVICES: "false"
  LOG_LEVEL: "info"
  ALLOWED_ORIGINS: "https://vault.ae,https://www.vault.ae,https://api.vault.ae"
  REDIS_EVENT_CHANNEL_PREFIX: "vault:"
