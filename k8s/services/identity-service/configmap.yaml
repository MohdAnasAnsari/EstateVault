apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-service-config
  labels:
    app: vault
    service: identity-service
data:
  PORT: "3001"
  NODE_ENV: "production"
  MOCK_SERVICES: "false"
  LOG_LEVEL: "info"
  NEXTAUTH_URL: "https://vault.ae"
  ALLOWED_ORIGINS: "https://vault.ae,https://www.vault.ae,https://api.vault.ae"
  JWT_EXPIRES_IN: "15m"
  REFRESH_TOKEN_EXPIRES_IN: "7d"
  BCRYPT_ROUNDS: "12"
  REDIS_EVENT_CHANNEL_PREFIX: "vault:"
