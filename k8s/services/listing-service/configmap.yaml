apiVersion: v1
kind: ConfigMap
metadata:
  name: listing-service-config
  labels:
    app: vault
    service: listing-service
data:
  PORT: "3002"
  NODE_ENV: "production"
  MOCK_SERVICES: "false"
  LOG_LEVEL: "info"
  ALLOWED_ORIGINS: "https://vault.ae,https://www.vault.ae,https://api.vault.ae"
  AI_SERVICE_URL: "http://ai-service:3006"
  MEILISEARCH_HOST: "http://meilisearch-service:7700"
  REDIS_EVENT_CHANNEL_PREFIX: "vault:"
