# EstateVault VAULT Platform — API Gateway Service
# Single ingress point for all client traffic. Handles JWT validation,
# rate-limiting, and reverse-proxying to downstream microservices.
# Also hosts the Socket.IO and WebRTC signalling namespaces.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault-prod
  labels:
    app.kubernetes.io/part-of: vault
# Shared ConfigMap consumed by every service Deployment via configMapKeyRef.
# Per-service URL env vars allow each service to reach its peers without
# hard-coding cluster DNS names in application code.
data:
  NODE_ENV: production
  MOCK_SERVICES: "false"
  MEILISEARCH_HOST: "http://meilisearch.vault-prod.svc.cluster.local:7700"
  R2_BUCKET: "vault-media"
  R2_PUBLIC_URL: "https://media.vault.example.com"
  # Internal service discovery URLs (cluster DNS)
  IDENTITY_SERVICE_URL: "http://identity-service.vault-prod.svc.cluster.local:3001"
  LISTING_SERVICE_URL: "http://listing-service.vault-prod.svc.cluster.local:3002"
  MESSAGING_SERVICE_URL: "http://messaging-service.vault-prod.svc.cluster.local:3003"
  MEDIA_SERVICE_URL: "http://media-service.vault-prod.svc.cluster.local:3004"
  CALL_SERVICE_URL: "http://call-service.vault-prod.svc.cluster.local:3005"
  AI_SERVICE_URL: "http://ai-service.vault-prod.svc.cluster.local:3006"
  NOTIFICATION_SERVICE_URL: "http://notification-service.vault-prod.svc.cluster.local:3007"
  ANALYTICS_SERVICE_URL: "http://analytics-service.vault-prod.svc.cluster.local:3008"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: vault-prod
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: vault
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 3000
      targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: vault-prod
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: vault
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/part-of: vault
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/api/metrics"
        prometheus.io/port: "3000"
    spec:
      terminationGracePeriodSeconds: 30
      # Spread pods across availability zones for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: api-gateway
      containers:
        - name: api-gateway
          image: ghcr.io/mohdanasansari/vault-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            # ── ConfigMap values ──────────────────────────────────────────────
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: vault-config
                  key: NODE_ENV
            - name: MOCK_SERVICES
              valueFrom:
                configMapKeyRef:
                  name: vault-config
                  key: MOCK_SERVICES
            - name: IDENTITY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: vault-config
                  key: IDENTITY_SERVICE_URL
            - name: LISTING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: vault-config
                  key: LISTING_SERVICE_URL
            - name: MESSAGING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: vault-config
                  key: MESSAGING_SERVICE_URL
            - name: MEDIA_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: vault-config
                  key: MEDIA_SERVICE_URL
            - name: CALL_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: vault-config
                  key: CALL_SERVICE_URL
            - name: AI_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: vault-config
                  key: AI_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: vault-config
                  key: NOTIFICATION_SERVICE_URL
            - name: ANALYTICS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: vault-config
                  key: ANALYTICS_SERVICE_URL
            # ── Secret values ─────────────────────────────────────────────────
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: NEXTAUTH_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: REDIS_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: OPENAI_API_KEY
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: SENTRY_DSN
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: SENDGRID_API_KEY
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: R2_ACCESS_KEY_ID
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: R2_SECRET_ACCESS_KEY
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: vault-prod
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: vault
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    # Scale up quickly; scale down conservatively to avoid flapping
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
