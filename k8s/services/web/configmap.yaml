apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  labels:
    app: vault
    service: web
data:
  PORT: "3000"
  NODE_ENV: "production"
  MOCK_SERVICES: "false"
  NEXT_PUBLIC_API_URL: "https://api.vault.ae/api/v1"
  NEXT_PUBLIC_SOCKET_URL: "https://api.vault.ae"
  NEXT_PUBLIC_CALL_URL: "https://api.vault.ae"
  NEXTAUTH_URL: "https://vault.ae"
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: "CHANGE_ME"
  CDN_URL: "https://assets.vault.ae"
  R2_PUBLIC_URL: "https://assets.vault.ae"
