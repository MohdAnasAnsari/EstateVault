apiVersion: v1
kind: Secret
metadata:
  name: vault-secrets
stringData:
  DATABASE_URL: "postgresql://vault:CHANGE_ME@postgres-service:5432/vault_staging"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  template:
    spec:
      containers:
        - name: postgres
          env:
            - name: POSTGRES_DB
              value: vault_staging
