# EstateVault VAULT Platform — Nginx Ingress
# All external HTTP/S traffic enters through this single Ingress resource.
# TLS is managed by cert-manager with a Let's Encrypt prod ClusterIssuer.
#
# Route decisions:
#   /api/*          → api-gateway (REST API)
#   /socket.io/*    → api-gateway (Socket.IO, needs long timeouts)
#   /call-signal/*  → api-gateway (WebRTC signalling, needs long timeouts)
#
# The extended proxy-read/send timeouts (3600s) prevent Nginx from tearing
# down persistent WebSocket connections used by Socket.IO and WebRTC.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-ingress
  namespace: vault-prod
  labels:
    app.kubernetes.io/part-of: vault
  annotations:
    # Use the nginx IngressClass installed in the cluster
    kubernetes.io/ingress.class: nginx

    # TLS certificate — cert-manager will provision a Let's Encrypt certificate
    # and rotate it automatically before expiry.
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # Enable regex path matching for the rules below
    nginx.ingress.kubernetes.io/use-regex: "true"

    # Extended timeouts for long-lived WebSocket / WebRTC connections
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

    # WebSocket upgrade passthrough
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

    # Security headers
    nginx.ingress.kubernetes.io/server-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting (nginx-ingress built-in): 100 req/s per IP, burst 200
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"

    # Body size limit — media-service accepts multipart uploads up to 50 MB
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.vault.example.com
      secretName: vault-tls-cert   # cert-manager populates this Secret
  rules:
    - host: api.vault.example.com
      http:
        paths:
          # REST API — must be first to avoid greedy matching by the regex paths
          - path: /api/.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000

          # Socket.IO — long-lived WebSocket connections for real-time chat/notifications
          - path: /socket.io/.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000

          # WebRTC signalling endpoint for call-service (proxied through api-gateway)
          - path: /call-signal/.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
