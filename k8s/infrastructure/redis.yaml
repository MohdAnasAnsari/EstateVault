# EstateVault VAULT Platform — Redis 7 (Alpine)
# Used for: session caching, Socket.IO adapter (pub/sub), BullMQ job queues,
# and rate-limit counters (brute-force protection from Phase 7).
# maxmemory-policy allkeys-lru means cache entries are evicted LRU when memory fills;
# suitable for session + ephemeral data (not a durable data store).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: vault-prod
  labels:
    app: redis
    app.kubernetes.io/part-of: vault
data:
  redis.conf: |
    # Maximum memory Redis may use before eviction kicks in
    maxmemory 400mb
    # LRU eviction — least-recently-used key is removed when memory is full
    maxmemory-policy allkeys-lru
    # Disable AOF persistence — Redis is used as a cache, not a durable store
    appendonly no
    # Save a RDB snapshot every 900 s if at least 1 key changed
    save 900 1
    save 300 10
    # Require password authentication (password injected via env var via --requirepass flag below)
    # Note: REDIS_PASSWORD is appended in the command array below; configmap covers tuning only.
    tcp-keepalive 60
    loglevel notice

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: vault-prod
  labels:
    app: redis
    app.kubernetes.io/part-of: vault
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: vault-prod
  labels:
    app: redis
    app.kubernetes.io/part-of: vault
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/part-of: vault
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 999   # redis user in the alpine image
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          # Load config file; append requirepass from secret at runtime
          command:
            - sh
            - -c
            - |
              exec redis-server /usr/local/etc/redis/redis.conf \
                --requirepass "$(REDIS_PASSWORD)"
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$(REDIS_PASSWORD)" ping
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$(REDIS_PASSWORD)" ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-config
              mountPath: /usr/local/etc/redis
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
            items:
              - key: redis.conf
                path: redis.conf
