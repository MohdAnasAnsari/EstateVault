# EstateVault VAULT Platform — PostgreSQL 16 with pgvector extension
# Uses StatefulSet so each pod gets a stable hostname and its own PVC.
# The init ConfigMap runs once at DB creation to enable the pgvector extension
# required by the AI-service embeddings workflow.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: vault-prod
  labels:
    app: postgres
    app.kubernetes.io/part-of: vault
data:
  # Executed by the initdb entrypoint on first startup.
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE EXTENSION IF NOT EXISTS pg_trgm;      -- fuzzy search used by listing-service
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";  -- UUID primary keys
    COMMENT ON EXTENSION vector IS 'pgvector: dense vector similarity search for AI embeddings';

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: vault-prod
  labels:
    app: postgres
    app.kubernetes.io/part-of: vault
data:
  POSTGRES_DB: vault
  POSTGRES_USER: vault_user
  # POSTGRES_PASSWORD is injected from vault-secrets

---
# Headless service gives each StatefulSet pod a stable DNS name:
# postgres-0.postgres-headless.vault-prod.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: vault-prod
  labels:
    app: postgres
    app.kubernetes.io/part-of: vault
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
# ClusterIP service for application pods — round-robins across replicas.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: vault-prod
  labels:
    app: postgres
    app.kubernetes.io/part-of: vault
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: vault-prod
  labels:
    app: postgres
    app.kubernetes.io/part-of: vault
    app.kubernetes.io/component: database
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/part-of: vault
      annotations:
        # Prometheus postgres-exporter sidecar scrape hint (if deployed separately)
        prometheus.io/scrape: "false"
    spec:
      terminationGracePeriodSeconds: 60   # allow in-flight transactions to finish
      securityContext:
        fsGroup: 999                       # postgres user GID in the official image
      initContainers:
        # Copy the init SQL into the docker-entrypoint-initdb.d directory
        - name: copy-init-sql
          image: busybox:1.36
          command: ["sh", "-c", "cp /init-sql/init.sql /docker-entrypoint-initdb.d/init.sql"]
          volumeMounts:
            - name: init-sql
              mountPath: /init-sql
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata   # subdirectory avoids lost+found issue on some CSIs
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: 1000m
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init-sql
        - name: initdb
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app: postgres
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard          # override with your cloud CSI class (gp3, premium-rwo, etc.)
        resources:
          requests:
            storage: 20Gi
