# This dashboard assumes kube-prometheus-stack is installed in the
# vault-monitoring namespace and that application metrics are exposed
# through Prometheus-compatible endpoints where available.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-grafana-dashboard
  namespace: vault-monitoring
  labels:
    app: vault
    grafana_dashboard: "1"
data:
  vault-platform-overview.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum by (service) (rate(http_request_duration_seconds_count{namespace=~\"$namespace\",service!=\"\"}[5m]))",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "HTTP Request Rate Per Service",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, service) (rate(http_request_duration_seconds_bucket{namespace=~\"$namespace\",service!=\"\"}[5m])))",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "P95 Response Latency Per Service",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(increase(vault_deal_rooms_opened_total{namespace=~\"$namespace\"}[1h]))",
              "refId": "A"
            }
          ],
          "title": "Deal Rooms Opened Per Hour",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 6,
            "y": 8
          },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(vault_ai_queue_depth{namespace=~\"$namespace\"})",
              "refId": "A"
            }
          ],
          "title": "AI Service Queue Depth",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum by (service) (rate(http_request_duration_seconds_count{namespace=~\"$namespace\",service!=\"\",status=~\"5..\"}[5m])) / clamp_min(sum by (service) (rate(http_request_duration_seconds_count{namespace=~\"$namespace\",service!=\"\"}[5m])), 0.0001)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Error Rate Per Service",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum by (deployment) (kube_deployment_status_replicas_available{namespace=~\"$namespace\",deployment=~\"api-gateway|identity-service|listing-service|messaging-service|media-service|call-service|ai-service|notification-service|analytics-service|web\"})",
              "legendFormat": "{{deployment}}",
              "refId": "A"
            }
          ],
          "title": "Pod Count Per Service",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 12,
            "y": 16
          },
          "id": 7,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(pg_stat_database_numbackends{namespace=~\"$namespace\"})",
              "refId": "A"
            }
          ],
          "title": "PostgreSQL Connections",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "unit": "decbytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 18,
            "y": 16
          },
          "id": 8,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(redis_memory_used_bytes{namespace=~\"$namespace\"})",
              "refId": "A"
            }
          ],
          "title": "Redis Memory Usage",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "vault",
        "microservices",
        "kubernetes"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": "vault-prod",
              "value": "vault-prod"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "definition": "label_values(kube_namespace_labels{label_app=\"vault\"}, namespace)",
            "includeAll": false,
            "label": "Namespace",
            "name": "namespace",
            "options": [],
            "query": {
              "query": "label_values(kube_namespace_labels{label_app=\"vault\"}, namespace)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 1,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "Vault Platform Overview",
      "version": 1,
      "weekStart": ""
    }
