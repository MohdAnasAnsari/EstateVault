# EstateVault VAULT Platform — Prometheus ServiceMonitor
# Requires the Prometheus Operator (kube-prometheus-stack) to be installed.
# The ServiceMonitor selects all vault-prod services whose pods carry the
# annotation prometheus.io/scrape: "true" and scrapes /api/metrics every 30s.
#
# Each service Deployment already carries the prometheus.io/* annotations;
# the ServiceMonitor here is the Operator-native alternative that doesn't
# require the operator's annotation-discovery feature to be enabled.
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vault-services
  namespace: vault-prod
  labels:
    app.kubernetes.io/part-of: vault
    # This label must match the Prometheus CR's serviceMonitorSelector
    release: prometheus
spec:
  # Only scrape Services in the vault-prod namespace
  namespaceSelector:
    matchNames:
      - vault-prod
  # Match any Service labelled app.kubernetes.io/part-of: vault
  selector:
    matchLabels:
      app.kubernetes.io/part-of: vault
  endpoints:
    - path: /api/metrics
      interval: 30s
      scheme: http
      # Honour the per-pod port named "http" (all vault services expose one)
      port: http
      # Relabel: preserve the app label as the job label in Prometheus
      relabelings:
        - sourceLabels: [__meta_kubernetes_service_label_app]
          targetLabel: job
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace

---
# PrometheusRule: alert when any vault service has zero ready pods.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vault-alerts
  namespace: vault-prod
  labels:
    app.kubernetes.io/part-of: vault
    release: prometheus
spec:
  groups:
    - name: vault.availability
      interval: 30s
      rules:
        - alert: VaultServiceDown
          expr: |
            kube_deployment_status_replicas_available{namespace="vault-prod"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Vault service {{ $labels.deployment }} has 0 available replicas"
            description: "Deployment {{ $labels.deployment }} in vault-prod has had no available replicas for more than 2 minutes."

        - alert: VaultHighCPU
          expr: |
            rate(container_cpu_usage_seconds_total{namespace="vault-prod",container!=""}[5m])
              / on(pod, container) kube_pod_container_resource_limits{namespace="vault-prod",resource="cpu"}
            > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} CPU > 90% of limit"
            description: "Pod {{ $labels.pod }} container {{ $labels.container }} has been using more than 90% of its CPU limit for 5 minutes."

        - alert: VaultHighMemory
          expr: |
            container_memory_working_set_bytes{namespace="vault-prod",container!=""}
              / on(pod, container) kube_pod_container_resource_limits{namespace="vault-prod",resource="memory"}
            > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} memory > 85% of limit"
            description: "Pod {{ $labels.pod }} is approaching its memory limit. OOMKill risk."
