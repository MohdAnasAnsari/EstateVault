[databases]
; Route vault_dev to the actual Postgres container
vault_dev = host=vault_postgres port=5432 dbname=vault_dev

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — safe for Drizzle ORM (no SET, no advisory locks per session)
pool_mode = transaction
max_client_conn = 500
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Keep prepared statements off (required for transaction mode)
ignore_startup_parameters = extra_float_digits

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; Timeouts
server_idle_timeout = 600
client_idle_timeout = 0
query_timeout = 30
query_wait_timeout = 120
client_login_timeout = 60

; Admin
admin_users = vault
stats_users = vault
