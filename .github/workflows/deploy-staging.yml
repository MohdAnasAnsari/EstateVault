name: CD - Deploy to Staging

on:
  push:
    branches:
      - main

env:
  PNPM_VERSION: 9
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/vault

jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: apps/services/api-gateway/Dockerfile
          - service: identity-service
            dockerfile: apps/services/identity-service/Dockerfile
          - service: listing-service
            dockerfile: apps/services/listing-service/Dockerfile
          - service: messaging-service
            dockerfile: apps/services/messaging-service/Dockerfile
          - service: media-service
            dockerfile: apps/services/media-service/Dockerfile
          - service: call-service
            dockerfile: apps/services/call-service/Dockerfile
          - service: ai-service
            dockerfile: apps/services/ai-service/Dockerfile
          - service: notification-service
            dockerfile: apps/services/notification-service/Dockerfile
          - service: analytics-service
            dockerfile: apps/services/analytics-service/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  migrate-staging:
    name: Run DB migrations (staging)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm turbo run db:migrate --filter=@vault/db

  deploy-staging:
    name: Deploy to K8s staging
    runs-on: ubuntu-latest
    needs: migrate-staging
    environment:
      name: staging
      url: https://staging.vault.ae
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.2

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Update image tags in kustomize
        shell: bash
        working-directory: k8s/overlays/staging
        run: |
          SHA="${GITHUB_SHA}"
          for SERVICE in api-gateway identity-service listing-service messaging-service media-service call-service ai-service notification-service analytics-service web; do
            kustomize edit set image ghcr.io/${{ github.repository_owner }}/vault-${SERVICE}=ghcr.io/${{ github.repository_owner }}/vault-${SERVICE}:sha-${SHA:0:7}
          done

      - name: Deploy to staging
        run: kubectl apply -k k8s/overlays/staging

      - name: Wait for rollout
        shell: bash
        run: |
          for SERVICE in api-gateway identity-service listing-service messaging-service media-service call-service ai-service notification-service analytics-service web; do
            kubectl rollout status deployment/${SERVICE} -n vault-staging --timeout=300s
          done

      - name: Run smoke tests
        shell: bash
        run: |
          sleep 10
          curl -f https://staging.vault.ae/api/health
          curl -f "https://api.staging.vault.ae/api/v1/listings?limit=5"
          echo "Smoke tests passed"

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging deploy ${{ job.status }}: ${{ github.event.head_commit.message }} (sha: ${{ github.sha }})"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
