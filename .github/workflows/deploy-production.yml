name: CD - Deploy to Production

on:
  push:
    tags:
      - v*.*.*

env:
  PNPM_VERSION: 9
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/vault

jobs:
  validate-tag:
    name: Validate semver tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag format
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG. Use semver like v1.2.3"
            exit 1
          fi
          echo "Valid tag: $TAG"

  retag-images:
    name: Retag staging images for production
    runs-on: ubuntu-latest
    needs: validate-tag
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - identity-service
          - listing-service
          - messaging-service
          - media-service
          - call-service
          - ai-service
          - notification-service
          - analytics-service
          - web
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag staging to production version
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          SHA_TAG=sha-${GITHUB_SHA:0:7}
          docker pull ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${SHA_TAG}
          docker tag ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${SHA_TAG} ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${TAG}
          docker tag ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${SHA_TAG} ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:stable
          docker push ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${TAG}
          docker push ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:stable

  migrate-production:
    name: Run DB migrations (production)
    runs-on: ubuntu-latest
    needs: retag-images
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations (with backup first when available)
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          echo "Running pre-migration backup..."
          if grep -Eq '"db:backup"[[:space:]]*:' packages/db/package.json; then
            pnpm turbo run db:backup --filter=@vault/db
          else
            echo "No db:backup script found in @vault/db; skipping backup step."
          fi
          echo "Running migrations..."
          pnpm turbo run db:migrate --filter=@vault/db

  deploy-production:
    name: Rolling deploy to production K8s
    runs-on: ubuntu-latest
    needs: migrate-production
    permissions:
      contents: write
    environment:
      name: production
      url: https://vault.ae
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.2

      - name: Configure kubeconfig (production)
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Set production image tags
        shell: bash
        working-directory: k8s/overlays/prod
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          for SERVICE in api-gateway identity-service listing-service messaging-service media-service call-service ai-service notification-service analytics-service web; do
            kustomize edit set image ghcr.io/${{ github.repository_owner }}/vault-${SERVICE}=ghcr.io/${{ github.repository_owner }}/vault-${SERVICE}:${TAG}
          done

      - name: Deploy - canary
        shell: bash
        run: |
          kubectl apply -k k8s/overlays/prod
          for SERVICE in api-gateway identity-service listing-service messaging-service; do
            kubectl rollout status deployment/${SERVICE} -n vault-prod --timeout=120s
          done

      - name: Monitor canary (5 minutes)
        shell: bash
        run: |
          set -euo pipefail
          PROMETHEUS_SERVICE=$(
            kubectl get svc -n vault-monitoring -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' \
              | grep -E '(^kube-prometheus-stack-prometheus$|prometheus)' \
              | head -n1
          )

          if [ -z "${PROMETHEUS_SERVICE}" ]; then
            echo "Prometheus service not found in vault-monitoring namespace"
            exit 1
          fi

          kubectl port-forward -n vault-monitoring "svc/${PROMETHEUS_SERVICE}" 19090:9090 >/tmp/prometheus-port-forward.log 2>&1 &
          PF_PID=$!
          trap 'kill ${PF_PID} 2>/dev/null || true' EXIT
          sleep 5

          echo "Monitoring error rate for 5 minutes..."
          for i in {1..10}; do
            RESPONSE=$(curl -sf "http://127.0.0.1:19090/api/v1/query?query=sum(rate(http_requests_total%7Bstatus%3D~%225..%22%7D%5B1m%5D))" || true)
            ERROR_RATE=$(printf '%s' "${RESPONSE}" | jq -r '.data.result[0].value[1] // "0"' 2>/dev/null || echo "0")
            echo "Error rate: ${ERROR_RATE:-0}"
            python3 -c "import sys; rate=float('${ERROR_RATE:-0}'); sys.exit(1 if rate > 0.05 else 0)" || {
              echo "Error rate too high - rolling back"
              exit 1
            }
            sleep 30
          done
          echo "Canary healthy - proceeding to full rollout"

      - name: Full rollout
        shell: bash
        run: |
          for SERVICE in api-gateway identity-service listing-service messaging-service media-service call-service ai-service notification-service analytics-service web; do
            kubectl rollout status deployment/${SERVICE} -n vault-prod --timeout=300s
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}

      - name: Tag Sentry release
        shell: bash
        run: |
          curl https://sentry.io/api/0/organizations/${{ secrets.SENTRY_ORG }}/releases/ \
            -H "Authorization: Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"version":"${{ github.ref_name }}","projects":["vault-web","vault-api"]}'

      - name: Notify team
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production deploy ${{ job.status }}: ${{ github.ref_name }}\n${{ job.status != 'success' && 'ROLLBACK TRIGGERED' || 'All systems nominal' }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  rollback-on-failure:
    name: Auto-rollback if deploy fails
    runs-on: ubuntu-latest
    needs: deploy-production
    if: ${{ always() && needs.deploy-production.result == 'failure' }}
    steps:
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Rollback all deployments
        shell: bash
        run: |
          for SERVICE in api-gateway identity-service listing-service messaging-service media-service call-service ai-service notification-service analytics-service web; do
            echo "Rolling back ${SERVICE}..."
            kubectl rollout undo deployment/${SERVICE} -n vault-prod
            kubectl rollout status deployment/${SERVICE} -n vault-prod --timeout=120s
          done
          echo "All services rolled back to previous version"

      - name: Page on-call engineer
        shell: bash
        run: |
          curl -X POST "https://events.pagerduty.com/v2/enqueue" \
            -H "Content-Type: application/json" \
            -d '{
              "routing_key": "${{ secrets.PAGERDUTY_ROUTING_KEY }}",
              "event_action": "trigger",
              "payload": {
                "summary": "VAULT production deployment failed and was rolled back",
                "severity": "critical",
                "source": "github-actions"
              }
            }'
