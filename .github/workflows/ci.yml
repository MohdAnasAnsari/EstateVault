name: CI - Quality Gate

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

env:
  PNPM_VERSION: 9

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  quality:
    name: Type check - Lint - Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (all packages + services)
        run: pnpm turbo run type-check

      - name: ESLint
        shell: bash
        run: |
          if find apps packages -name package.json -print0 | xargs -0 grep -Eq '"lint"[[:space:]]*:'; then
            pnpm turbo run lint
          else
            echo "No workspace lint scripts found; skipping ESLint."
          fi

      - name: Prettier check
        run: pnpm prettier --check "**/*.{ts,tsx,json,md}"

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vault_test
          POSTGRES_PASSWORD: vault_test
          POSTGRES_DB: vault_test
        options: >-
          --health-cmd "pg_isready -U vault_test -d vault_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations (test DB)
        env:
          DATABASE_URL: postgresql://vault_test:vault_test@localhost:5432/vault_test
        run: pnpm turbo run db:migrate --filter=@vault/db

      - name: Run unit tests (workspace scripts when present)
        shell: bash
        env:
          MOCK_SERVICES: 'true'
          DATABASE_URL: postgresql://vault_test:vault_test@localhost:5432/vault_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test_nextauth_secret_not_for_prod
          SESSION_SECRET: test_session_secret_not_for_prod
          JWT_SECRET: test_jwt_secret_not_for_prod
        run: |
          if find apps packages -name package.json -print0 | xargs -0 grep -Eq '"test"[[:space:]]*:'; then
            pnpm turbo run test -- --reporter=verbose
          else
            echo "No workspace test scripts found; skipping unit tests."
          fi

      - name: Upload coverage
        if: ${{ always() && hashFiles('**/coverage/**') != '' }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build-check:
    name: Build all services (changed only)
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build changed services (Turborepo cache)
        run: pnpm turbo run build --filter='[HEAD^1]'

      - name: Comment PR with changed services
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let changed = [];

            try {
              const output = execSync("pnpm turbo ls --filter='[HEAD^1]' --output=json", {
                encoding: 'utf8',
                stdio: ['ignore', 'pipe', 'pipe'],
              });
              const parsed = JSON.parse(output);
              const items = parsed.packages?.items ?? [];
              changed = items
                .filter((pkg) =>
                  pkg.path.startsWith('apps\\services\\') ||
                  pkg.path.startsWith('apps/services/') ||
                  pkg.path === 'apps\\web' ||
                  pkg.path === 'apps/web'
                )
                .map((pkg) => `- ${pkg.name}`);
            } catch (error) {
              changed = [`- Unable to determine changed services (${error.message})`];
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Changed services\n${changed.length ? changed.join('\n') : 'No service changes detected'}`,
            });
