# EstateVault VAULT Platform — Continuous Integration
# Runs on every push and on PRs targeting main.
# Jobs:
#   type-check   — TypeScript compilation check across all packages (turbo)
#   build        — Full production build via turbo
#   docker-build — Build Docker images for all 9 services in parallel (matrix)
#                  Images are pushed to ghcr.io ONLY when running on main branch.
#
# All three jobs run in parallel; docker-build does not depend on the others
# because it tests the Docker build independently of the TypeScript toolchain.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/mohdanasansari/vault

jobs:
  # ── Type checking ────────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (turbo)
        run: pnpm turbo type-check

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (turbo)
        run: pnpm turbo build

  # ── Docker build (matrix) ────────────────────────────────────────────────────
  docker-build:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io
    strategy:
      fail-fast: false  # if one service build fails, continue the rest
      matrix:
        include:
          - service: api-gateway
            context: apps/services/api-gateway
          - service: identity-service
            context: apps/services/identity-service
          - service: listing-service
            context: apps/services/listing-service
          - service: messaging-service
            context: apps/services/messaging-service
          - service: media-service
            context: apps/services/media-service
          - service: call-service
            context: apps/services/call-service
          - service: ai-service
            context: apps/services/ai-service
          - service: notification-service
            context: apps/services/notification-service
          - service: analytics-service
            context: apps/services/analytics-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        # Only login when we intend to push (main branch)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker meta (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=ci-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache stored in the GitHub Actions cache — speeds up rebuilds
          # when only application code changes (node_modules layer is cached).
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            NODE_VERSION=22
            BUILD_SHA=${{ github.sha }}
