version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vault_postgres
    environment:
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: vault
      POSTGRES_DB: vault_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vault -d vault_dev']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vault_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: vault_meilisearch
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Phase 7: PgBouncer connection pooler
  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: vault_pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_HOST: vault_postgres
      POSTGRESQL_PORT: '5432'
      POSTGRESQL_DATABASE: vault_dev
      POSTGRESQL_USERNAME: vault
      POSTGRESQL_PASSWORD: vault
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: '500'
      PGBOUNCER_DEFAULT_POOL_SIZE: '25'
      PGBOUNCER_MIN_POOL_SIZE: '5'
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits
    ports:
      - '6432:6432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-h', 'localhost', '-p', '6432', '-U', 'vault']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
