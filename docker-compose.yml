version: '3.9'

# ─── EstateVault – local development compose ──────────────────────────────────
# Infrastructure + all 9 microservices.
# Use docker-compose.override.yml for hot-reload source mounts (applied automatically).

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: vault_postgres
    environment:
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: vault
      POSTGRES_DB: vault_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vault -d vault_dev']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vault_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: vault_meilisearch
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: vault_pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_HOST: vault_postgres
      POSTGRESQL_PORT: '5432'
      POSTGRESQL_DATABASE: vault_dev
      POSTGRESQL_USERNAME: vault
      POSTGRESQL_PASSWORD: vault
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: '500'
      PGBOUNCER_DEFAULT_POOL_SIZE: '25'
      PGBOUNCER_MIN_POOL_SIZE: '5'
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits
    ports:
      - '6432:6432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-h', 'localhost', '-p', '6432', '-U', 'vault']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Microservices ───────────────────────────────────────────────────────────

  api-gateway:
    <<: *service-defaults
    container_name: vault_api_gateway
    build:
      context: ./apps/services/api-gateway
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
    volumes:
      - ./apps/services/api-gateway/src:/app/src
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  identity-service:
    <<: *service-defaults
    container_name: vault_identity_service
    build:
      context: ./apps/services/identity-service
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: '3001'
    volumes:
      - ./apps/services/identity-service/src:/app/src
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  listing-service:
    <<: *service-defaults
    container_name: vault_listing_service
    build:
      context: ./apps/services/listing-service
      dockerfile: Dockerfile
    ports:
      - '3002:3002'
    environment:
      PORT: '3002'
    volumes:
      - ./apps/services/listing-service/src:/app/src
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3002/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  messaging-service:
    <<: *service-defaults
    container_name: vault_messaging_service
    build:
      context: ./apps/services/messaging-service
      dockerfile: Dockerfile
    ports:
      - '3003:3003'
    environment:
      PORT: '3003'
    volumes:
      - ./apps/services/messaging-service/src:/app/src
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3003/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  media-service:
    <<: *service-defaults
    container_name: vault_media_service
    build:
      context: ./apps/services/media-service
      dockerfile: Dockerfile
    ports:
      - '3004:3004'
    environment:
      PORT: '3004'
    volumes:
      - ./apps/services/media-service/src:/app/src
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3004/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  call-service:
    <<: *service-defaults
    container_name: vault_call_service
    build:
      context: ./apps/services/call-service
      dockerfile: Dockerfile
    ports:
      - '3005:3005'
    environment:
      PORT: '3005'
    volumes:
      - ./apps/services/call-service/src:/app/src
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3005/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-service:
    <<: *service-defaults
    container_name: vault_ai_service
    build:
      context: ./apps/services/ai-service
      dockerfile: Dockerfile
    ports:
      - '3006:3006'
    environment:
      PORT: '3006'
    volumes:
      - ./apps/services/ai-service/src:/app/src
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3006/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  notification-service:
    <<: *service-defaults
    container_name: vault_notification_service
    build:
      context: ./apps/services/notification-service
      dockerfile: Dockerfile
    ports:
      - '3007:3007'
    environment:
      PORT: '3007'
    volumes:
      - ./apps/services/notification-service/src:/app/src
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3007/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  analytics-service:
    <<: *service-defaults
    container_name: vault_analytics_service
    build:
      context: ./apps/services/analytics-service
      dockerfile: Dockerfile
    ports:
      - '3008:3008'
    environment:
      PORT: '3008'
    volumes:
      - ./apps/services/analytics-service/src:/app/src
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3008/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

# ─── Named volumes ────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
