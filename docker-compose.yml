networks:
  vault-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:

x-service-defaults: &service-defaults
  networks:
    - vault-network
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: vault
      POSTGRES_DB: vault_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vault -d vault_dev']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vault-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vault-network
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: masterKey_dev_only
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vault-network
    restart: unless-stopped

  pgbouncer:
    image: bitnami/pgbouncer:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: '5432'
      POSTGRESQL_DATABASE: vault_dev
      POSTGRESQL_USERNAME: vault
      POSTGRESQL_PASSWORD: vault
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: '500'
      PGBOUNCER_DEFAULT_POOL_SIZE: '25'
      PGBOUNCER_MIN_POOL_SIZE: '5'
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits
    ports:
      - '6432:6432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-h', 'localhost', '-p', '6432', '-U', 'vault']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vault-network
    restart: unless-stopped

  api-gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/services/api-gateway/Dockerfile
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
      NODE_ENV: development
      MOCK_SERVICES: 'true'
      NEXTAUTH_SECRET: dev_nextauth_secret
      SESSION_SECRET: dev_session_secret
      ALLOWED_ORIGINS: http://localhost:3010
      IDENTITY_SERVICE_URL: http://identity-service:3001
      LISTING_SERVICE_URL: http://listing-service:3002
      MESSAGING_SERVICE_URL: http://messaging-service:3003
      MEDIA_SERVICE_URL: http://media-service:3004
      CALL_SERVICE_URL: http://call-service:3005
      AI_SERVICE_URL: http://ai-service:3006
      NOTIFICATION_SERVICE_URL: http://notification-service:3007
      ANALYTICS_SERVICE_URL: http://analytics-service:3008
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  identity-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/services/identity-service/Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: '3001'
      NODE_ENV: development
      MOCK_SERVICES: 'true'
      DATABASE_URL: postgresql://vault:vault@postgres:5432/vault_dev
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3010
      NEXTAUTH_SECRET: dev_nextauth_secret
      SESSION_SECRET: dev_session_secret
      ALLOWED_ORIGINS: http://localhost:3010
      BCRYPT_ROUNDS: '12'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  listing-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/services/listing-service/Dockerfile
    environment:
      PORT: '3002'
      NODE_ENV: development
      MOCK_SERVICES: 'true'
      DATABASE_URL: postgresql://vault:vault@postgres:5432/vault_dev
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: dev_nextauth_secret
      ALLOWED_ORIGINS: http://localhost:3010
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: masterKey_dev_only
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  messaging-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/services/messaging-service/Dockerfile
    ports:
      - '3003:3003'
    environment:
      PORT: '3003'
      NODE_ENV: development
      MOCK_SERVICES: 'true'
      DATABASE_URL: postgresql://vault:vault@postgres:5432/vault_dev
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: dev_nextauth_secret
      ALLOWED_ORIGINS: http://localhost:3010,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  media-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/services/media-service/Dockerfile
    environment:
      PORT: '3004'
      NODE_ENV: development
      MOCK_SERVICES: 'true'
      DATABASE_URL: postgresql://vault:vault@postgres:5432/vault_dev
      NEXTAUTH_SECRET: dev_nextauth_secret
      R2_BUCKET: vault-assets-dev
      R2_ACCOUNT_ID: mock-account
      R2_ACCESS_KEY_ID: mock-access-key
      R2_SECRET_ACCESS_KEY: mock-secret-key
      R2_PUBLIC_URL: https://example.invalid/vault-assets-dev
    depends_on:
      postgres:
        condition: service_healthy

  call-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/services/call-service/Dockerfile
    ports:
      - '3005:3005'
    environment:
      PORT: '3005'
      NODE_ENV: development
      MOCK_SERVICES: 'true'
      DATABASE_URL: postgresql://vault:vault@postgres:5432/vault_dev
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: dev_nextauth_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/services/ai-service/Dockerfile
    environment:
      PORT: '3006'
      NODE_ENV: development
      MOCK_SERVICES: 'true'
      DATABASE_URL: postgresql://vault:vault@postgres:5432/vault_dev
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: dev_nextauth_secret
      OPENAI_API_KEY: ''
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/services/notification-service/Dockerfile
    environment:
      PORT: '3007'
      NODE_ENV: development
      MOCK_SERVICES: 'true'
      DATABASE_URL: postgresql://vault:vault@postgres:5432/vault_dev
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: dev_nextauth_secret
      SENDGRID_API_KEY: ''
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/services/analytics-service/Dockerfile
    environment:
      PORT: '3008'
      NODE_ENV: development
      MOCK_SERVICES: 'true'
      DATABASE_URL: postgresql://vault:vault@postgres:5432/vault_dev
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: dev_nextauth_secret
      ALLOWED_ORIGINS: http://localhost:3010
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3010:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3003
      NEXT_PUBLIC_CALL_URL: http://localhost:3005
      NEXTAUTH_URL: http://localhost:3010
      NEXTAUTH_SECRET: dev_nextauth_secret
      MOCK_SERVICES: 'true'
    depends_on:
      api-gateway:
        condition: service_healthy
